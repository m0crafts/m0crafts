<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="textglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur1"/>
      <feGaussianBlur stdDeviation="3" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="orbglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="28" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="50%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#080c14"/>
    </linearGradient>
    <radialGradient id="orbBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbTeal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1c3a5e" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1c3a5e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#58A6FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0"/>
      <stop offset="30%" stop-color="#58A6FF" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#a8d4ff" stop-opacity="1"/>
      <stop offset="70%" stop-color="#58A6FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="900" height="220" fill="url(#bgGrad)"/>
  <line x1="0" y1="40" x2="900" y2="40" stroke="#58A6FF" stroke-width="0.3" stroke-opacity="0.07"/>
  <line x1="0" y1="80" x2="900" y2="80" stroke="#58A6FF" stroke-width="0.3" stroke-opacity="0.07"/>
  <line x1="0" y1="120" x2="900" y2="120" stroke="#58A6FF" stroke-width="0.3" stroke-opacity="0.07"/>
  <line x1="0" y1="160" x2="900" y2="160" stroke="#58A6FF" stroke-width="0.3" stroke-opacity="0.07"/>
  <line x1="0" y1="200" x2="900" y2="200" stroke="#58A6FF" stroke-width="0.3" stroke-opacity="0.07"/>
  <line x1="100" y1="0" x2="100" y2="220" stroke="#58A6FF" stroke-width="0.3" stroke-opacity="0.05"/>
  <line x1="200" y1="0" x2="200" y2="220" stroke="#58A6FF" stroke-width="0.3" stroke-opacity="0.05"/>
  <line x1="300" y1="0" x2="300" y2="220" stroke="#58A6FF" stroke-width="0.3" stroke-opacity="0.05"/>
  <line x1="400" y1="0" x2="400" y2="220" stroke="#58A6FF" stroke-width="0.3" stroke-opacity="0.05"/>
  <line x1="500" y1="0" x2="500" y2="220" stroke="#58A6FF" stroke-width="0.3" stroke-opacity="0.05"/>
  <line x1="600" y1="0" x2="600" y2="220" stroke="#58A6FF" stroke-width="0.3" stroke-opacity="0.05"/>
  <line x1="700" y1="0" x2="700" y2="220" stroke="#58A6FF" stroke-width="0.3" stroke-opacity="0.05"/>
  <line x1="800" y1="0" x2="800" y2="220" stroke="#58A6FF" stroke-width="0.3" stroke-opacity="0.05"/>
  <ellipse cx="160" cy="110" rx="180" ry="180" fill="url(#orbTeal)" filter="url(#orbglow)"/>
  <ellipse cx="740" cy="100" rx="160" ry="160" fill="url(#orbBlue)" filter="url(#orbglow)"/>
  <ellipse cx="450" cy="60" rx="120" ry="80" fill="url(#orbBlue)" filter="url(#orbglow)" opacity="0.4"/>
  <circle cx="80"  cy="30"  r="1.5" fill="#58A6FF" opacity="0.4"/>
  <circle cx="200" cy="55"  r="1"   fill="#58A6FF" opacity="0.3"/>
  <circle cx="320" cy="25"  r="1.5" fill="#58A6FF" opacity="0.5"/>
  <circle cx="580" cy="40"  r="1"   fill="#58A6FF" opacity="0.3"/>
  <circle cx="700" cy="20"  r="1.5" fill="#58A6FF" opacity="0.4"/>
  <circle cx="820" cy="50"  r="1"   fill="#58A6FF" opacity="0.25"/>
  <circle cx="50"  cy="160" r="1"   fill="#58A6FF" opacity="0.2"/>
  <circle cx="860" cy="155" r="1.5" fill="#58A6FF" opacity="0.3"/>
  <circle cx="440" cy="195" r="1"   fill="#58A6FF" opacity="0.2"/>
  <circle cx="130" cy="185" r="1"   fill="#58A6FF" opacity="0.25"/>
  <circle cx="760" cy="190" r="1.5" fill="#58A6FF" opacity="0.3"/>
  <path d="M0,175 C120,155 240,190 360,170 C480,150 600,188 720,168 C800,154 860,172 900,165 L900,220 L0,220 Z"
    fill="url(#waveGrad)"/>
  <path d="M0,188 C100,172 220,200 380,183 C520,168 660,196 800,180 C850,174 880,183 900,179 L900,220 L0,220 Z"
    fill="#58A6FF" opacity="0.06"/>
  <line x1="0" y1="173" x2="900" y2="173" stroke="url(#shimmer)" stroke-width="0.8"/>
  <text
    x="450" y="106"
    font-family="'Courier New', Courier, monospace"
    font-size="68"
    font-weight="700"
    fill="#58A6FF"
    text-anchor="middle"
    dominant-baseline="middle"
    filter="url(#textglow)"
    opacity="0.45"
  >m0crafts</text>
  <text
    x="450" y="106"
    font-family="'Courier New', Courier, monospace"
    font-size="68"
    font-weight="700"
    fill="#e6f3ff"
    text-anchor="middle"
    dominant-baseline="middle"
  >m0crafts</text>
  <text
    x="450" y="152"
